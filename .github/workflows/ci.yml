name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  core:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: Validate public repository
        run: python scripts/validate_repo.py
      - name: Scan working tree and Git history
        run: python scripts/privacy_scan.py --git-history
      - name: Verify deterministic File/Git evaluation baseline
        run: python scripts/evaluation_baseline.py verify
      - name: Verify hierarchical recall evaluation
        run: python scripts/hierarchical_evaluation.py verify
      - name: Verify v0.2 public release evidence
        run: python scripts/v0_2_release_evidence.py verify-public
      - name: Run tests without Mem0
        run: python -m unittest discover -s tests -p "test_*.py" -v

  optional-mem0-import:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.12"]
    runs-on: ${{ matrix.os }}
    env:
      MEM0_TELEMETRY: "False"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Bind Mem0 data to the runner temporary directory
        shell: python
        run: |
          import os
          from pathlib import Path

          mem0_dir = Path(os.environ["RUNNER_TEMP"]) / "opc-mem0-ci"
          with Path(os.environ["GITHUB_ENV"]).open("a", encoding="utf-8") as stream:
              stream.write(f"MEM0_DIR={mem0_dir}\n")
      - name: Install optional adapter dependency
        run: python -m pip install -r requirements-mem0.txt
      - name: Verify the supported Mem0 import surface
        run: python -c "from mem0 import Memory; print(Memory)"
      - name: Run adapter contract and isolation tests with Mem0 installed
        run: python -m unittest discover -s tests -p "test_*.py" -v
      - name: Construct the real pinned adapter in an isolated process
        run: python tests/integration/mem0_installed_smoke.py
